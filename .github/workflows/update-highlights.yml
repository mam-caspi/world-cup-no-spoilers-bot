name: Update FIFA highlight links

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC)
  workflow_dispatch:          # lets you run it manually from the Actions tab
    inputs:
      backfill:
        description: "Check ALL pending matches (ignore kickoff time)"
        type: boolean
        default: false

permissions:
  contents: write             # allows the job to commit games.json back

concurrency:
  group: update-highlights
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run updater
        env:
          FIFA_API_KEY: ${{ secrets.FIFA_API_KEY }}   # optional; only if you set it
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            node update-highlights.mjs --all
          else
            node update-highlights.mjs
          fi

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain games.json)" ]; then
            git config user.name  "highlights-bot"
            git config user.email "bot@users.noreply.github.com"
            git add games.json
            git commit -m "chore: update FIFA highlight links [skip ci]"
            git push
          else
            echo "No changes."
          fi
